services:
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: devmetric-ai
    restart: unless-stopped
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:?Set GOOGLE_API_KEY in .env}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash-lite}
    networks:
      - devmetric-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: devmetric-gateway
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    environment:
      - PORT=8080
      - AI_SERVICE_URL=http://ai-service:8000
      - FIREBASE_CREDENTIALS_PATH=/run/secrets/firebase_creds
    secrets:
      - firebase_creds
    depends_on:
      ai-service:
        condition: service_healthy
    networks:
      - devmetric-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: devmetric-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://gateway:8080
    depends_on:
      gateway:
        condition: service_started
    networks:
      - devmetric-net

secrets:
  firebase_creds:
    file: ./gateway/serviceAccountKey.json

networks:
  devmetric-net:
    driver: bridge
